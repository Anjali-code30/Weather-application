<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather-Application</title>
    <link rel="styleSheet" href="./output.css" />
    <link rel="icon" href="https://i.pinimg.com/736x/b5/2b/a0/b52ba05bc9eb02045450675acc9cae63.jpg"/>
</head>

<body class="min-h-screen bg-linear-to-br from-blue-400 via-sky-300 to-cyan-200 flex justify-center
 items-center p-4"></body>
<div 
class="w-full max-w-md bg-white/40 backdrop-blur-lg shadow-2xl rounded-2xl
 p-6 border border-white/40">
   <h1 class="text-3xl font-black text-center text-white drop-shadow-md mb-6"> 🌤 Weather Application</h1> 
   
   <div class="flex flex-col gap-4">
    <input type="text" placeholder="Enter Cityname" id="city-name"
    class = "w-full px-4 py-3 rounded-xl outline-none border-2 border-white/60 text-gray-800
    placeholder:gray-400 focus:ring-2 focus:ring-blue-500"/>

    <button class="bg-blue-600 hover:bg-blue-800 text-white font-semibold py-3 rounded-xl
    transition-all duration-500" id="search">Search Weather Details</button>

   </div>
   <div id="result" class="mt-6 hidden bg-white/40 rounded-2xl p-5"></div>
     </div>
     
<script src="./Script.js"></script>
</body>
</html>
